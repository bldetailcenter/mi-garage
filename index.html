<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Garaje</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f4f4f2;color:#1a1a1a;font-size:14px}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:210px;min-width:210px;background:#fff;border-right:1px solid #e5e5e2;display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:14px 12px 10px;border-bottom:1px solid #e5e5e2}
.sb-title{font-size:15px;font-weight:600}
.sb-sub{font-size:11px;color:#999;margin-top:2px}
.vlist{flex:1;overflow-y:auto;padding:6px 0}
.vitem{padding:8px 12px;cursor:pointer;border-left:2px solid transparent}
.vitem:hover{background:#f8f8f6}
.vitem.active{background:#f0f4ff;border-left-color:#3b6ef5}
.vname{font-weight:500;font-size:13px}
.vplate{font-size:11px;color:#888;margin-top:1px;font-family:monospace}
.add-vbtn{margin:8px 12px 4px;padding:8px;font-size:12px;background:#f0f4ff;border:1px solid #c5d0fa;border-radius:8px;cursor:pointer;color:#3b6ef5;width:calc(100% - 24px);font-weight:500}
.logout-btn{margin:4px 12px 12px;padding:5px;font-size:11px;background:none;border:none;color:#bbb;cursor:pointer;width:calc(100% - 24px)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tabs{display:flex;border-bottom:1px solid #e5e5e2;background:#fff;padding:0 12px;overflow-x:auto;flex-shrink:0;gap:2px}
.tab{padding:10px 12px;font-size:12px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:#888;white-space:nowrap;flex-shrink:0}
.tab.active{color:#3b6ef5;border-bottom-color:#3b6ef5}
.content{flex:1;overflow-y:auto;padding:16px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#aaa;font-size:13px;gap:8px;text-align:center}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sec-title{font-size:14px;font-weight:600}
.add-btn{padding:5px 12px;font-size:12px;background:#3b6ef5;color:#fff;border:none;border-radius:7px;cursor:pointer;font-weight:500}
.tbl-wrap{border:1px solid #e5e5e2;border-radius:10px;overflow:auto;background:#fff}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:8px 10px;text-align:left;font-weight:600;font-size:11px;color:#666;background:#f8f8f6;border-bottom:1px solid #e5e5e2;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{background:#eeeee8}
th.sort-asc::after{content:' ▲';opacity:.6;font-size:10px}
th.sort-desc::after{content:' ▼';opacity:.6;font-size:10px}
th.sortable::after{content:' ⇅';opacity:.25;font-size:10px}
td{padding:7px 10px;border-bottom:1px solid #f0f0ec;color:#1a1a1a;vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
.badge{display:inline-block;padding:2px 7px;border-radius:6px;font-size:11px;font-weight:500}
.b-ok{background:#e6f4ea;color:#1a7a3a}.b-warn{background:#fff8e1;color:#b45309}
.b-danger{background:#fdecea;color:#b91c1c}.b-info{background:#e8f0fe;color:#1a56d6}
.b-mec{background:#fde8ff;color:#7e22ce}.b-est{background:#fff0e0;color:#b45309}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-start;justify-content:center;padding:30px 8px;z-index:100;overflow-y:auto}
.modal{background:#fff;border-radius:12px;padding:20px;width:560px;max-width:98vw;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.modal-title{font-size:15px;font-weight:600;margin-bottom:14px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ff{display:flex;flex-direction:column;gap:4px}
.ff.s2{grid-column:span 2}
label{font-size:11px;color:#666;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
input,select,textarea{font-size:13px;padding:7px 9px;border:1px solid #ddd;border-radius:7px;background:#fff;color:#1a1a1a;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:#3b6ef5}
textarea{resize:vertical;min-height:60px}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.btn-c{padding:7px 16px;font-size:13px;border:1px solid #ddd;border-radius:7px;background:#fff;color:#666;cursor:pointer}
.btn-s{padding:7px 16px;font-size:13px;border:none;border-radius:7px;background:#3b6ef5;color:#fff;cursor:pointer;font-weight:600}
.vh-card{background:#fff;border:1px solid #e5e5e2;border-radius:12px;padding:14px 16px;margin-bottom:12px}
.vh-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap}
.vh-name{font-size:18px;font-weight:700}
.vh-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px 16px;margin-top:12px}
.vhf label{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.4px}
.vhf span{font-size:12px;font-weight:600;display:block;margin-top:2px}
.itv-ok{color:#1a7a3a}.itv-warn{color:#b45309}.itv-danger{color:#b91c1c}
.km-box{background:#fff;border:1px solid #e5e5e2;border-radius:12px;padding:14px 16px;margin-bottom:12px}
.km-row{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap}
.km-row input{max-width:180px}
.plist{margin-top:10px;display:flex;flex-direction:column;gap:5px}
.pi{padding:8px 12px;border-radius:8px;font-size:12px;border:1px solid}
.pi-urg{background:#fdecea;border-color:#f5c2bf;color:#b91c1c}
.pi-soon{background:#fff8e1;border-color:#fde68a;color:#b45309}
.pi-ok{background:#e6f4ea;border-color:#a8d5b5;color:#1a7a3a}
.notes-box{background:#fff;border:1px solid #e5e5e2;border-radius:12px;padding:14px 16px;margin-bottom:12px}
.del-btn{padding:2px 7px;font-size:11px;border:1px solid #fca5a5;border-radius:5px;background:transparent;color:#b91c1c;cursor:pointer}
.edt-btn{padding:2px 7px;font-size:11px;border:1px solid #ddd;border-radius:5px;background:transparent;color:#555;cursor:pointer}
.done-btn{padding:2px 7px;font-size:11px;border:1px solid #a8d5b5;border-radius:5px;background:transparent;color:#1a7a3a;cursor:pointer}
.acell{display:flex;gap:3px}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:12px}
.photo-card{border:1px solid #e5e5e2;border-radius:10px;overflow:hidden;position:relative;background:#fff}
.photo-card img{width:100%;height:120px;object-fit:cover;display:block;cursor:pointer}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px}
.lightbox img{max-width:100%;max-height:100%;object-fit:contain;border-radius:6px}
.lightbox-close{position:absolute;top:12px;right:16px;color:#fff;font-size:30px;cursor:pointer;background:none;border:none;line-height:1}
.photo-label{padding:5px 8px;font-size:11px;color:#666}
.photo-del{position:absolute;top:5px;right:5px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:5px;padding:2px 6px;font-size:11px;cursor:pointer}
.photo-star{position:absolute;top:5px;left:5px;background:rgba(0,0,0,.45);color:#fff;border:none;border-radius:5px;padding:2px 6px;font-size:12px;cursor:pointer}
.photo-star.active{background:#f59e0b}
.upload-zone{border:2px dashed #ddd;border-radius:10px;padding:20px;text-align:center;font-size:12px;color:#aaa;cursor:pointer}
.upload-zone:hover{border-color:#3b6ef5;color:#3b6ef5}
.docs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:9px}
.doc-card{background:#fff;border:1px solid #e5e5e2;border-radius:10px;padding:12px;display:flex;align-items:flex-start;gap:10px}
.doc-icon{font-size:24px;flex-shrink:0}
.doc-info{flex:1;min-width:0}
.doc-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-meta{font-size:11px;color:#888;margin-top:2px}
.doc-actions{display:flex;gap:4px;margin-top:7px}
.refs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.ref-card{background:#fff;border:1px solid #e5e5e2;border-radius:10px;padding:12px}
.ref-cat{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.ref-name{font-size:13px;font-weight:600}
.ref-ref{font-size:12px;color:#3b6ef5;margin-top:2px;font-family:monospace}
.export-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.exp-btn{padding:6px 14px;font-size:12px;font-weight:500;border:1px solid #ddd;border-radius:7px;background:#fff;color:#555;cursor:pointer}
.exp-btn:hover{background:#f0f4ff;color:#3b6ef5}
.hero-photo{width:100%;height:180px;object-fit:cover;border-radius:12px;margin-bottom:12px;border:1px solid #e5e5e2}
.notif{position:fixed;bottom:16px;right:16px;background:#1a1a1a;color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none}
.notif.show{opacity:1}
.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh;background:#f4f4f2}
.login-box{background:#fff;border-radius:16px;padding:32px;width:340px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.login-title{font-size:22px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:13px;color:#888;margin-bottom:20px}
.login-field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.login-err{font-size:12px;color:#b91c1c;margin-top:8px;min-height:16px}
.login-btn{width:100%;padding:10px;font-size:14px;font-weight:600;background:#3b6ef5;color:#fff;border:none;border-radius:8px;cursor:pointer;margin-top:4px}
.balance-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:20px}
.bal-card{background:#fff;border:1px solid #e5e5e2;border-radius:10px;padding:14px}
.bal-label{font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.bal-amount{font-size:20px;font-weight:700;margin-top:4px}
.bal-count{font-size:11px;color:#aaa;margin-top:2px}
.bal-total{background:#3b6ef5;color:#fff;border-color:#3b6ef5}
.bal-total .bal-label,.bal-total .bal-count{color:rgba(255,255,255,.7)}
.year-sel{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.task-done td{opacity:.5;text-decoration:line-through}

/* ── MÓVIL ── */
@media(max-width:640px){
  .app{flex-direction:column}
  .sidebar{width:100%;min-width:unset;height:auto;border-right:none;border-bottom:1px solid #e5e5e2;flex-direction:row;align-items:center;flex-shrink:0;overflow:visible;position:relative;z-index:50}
  .sb-head{padding:10px 12px;border-bottom:none;flex:1}
  .sb-title{font-size:14px}
  .sb-sub{display:none}
  .vlist{display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border-bottom:1px solid #e5e5e2;max-height:60vh;overflow-y:auto;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.1)}
  .vlist.open{display:block}
  .add-vbtn{display:none}
  .logout-btn{display:none}
  .sb-mobile-btns{display:flex;gap:6px;padding:8px 10px;flex-shrink:0;align-items:center}
  .sb-toggle{padding:6px 10px;font-size:12px;background:#f0f4ff;border:1px solid #c5d0fa;border-radius:7px;cursor:pointer;color:#3b6ef5;font-weight:500;white-space:nowrap}
  .sb-add{padding:6px 10px;font-size:12px;background:#3b6ef5;color:#fff;border:none;border-radius:7px;cursor:pointer;font-weight:500;white-space:nowrap}
  .sb-logout{padding:6px 8px;font-size:12px;background:none;border:1px solid #eee;border-radius:7px;cursor:pointer;color:#aaa}
  .tabs{padding:0 8px}
  .tab{padding:8px 9px;font-size:11px}
  .content{padding:10px}
  .vh-grid{grid-template-columns:1fr 1fr}
  .balance-grid{grid-template-columns:1fr 1fr}
  .fg{grid-template-columns:1fr}
  .ff.s2{grid-column:span 1}
  .modal{padding:14px}
  .refs-grid{grid-template-columns:1fr 1fr}
  .photo-grid{grid-template-columns:1fr 1fr}
  .docs-grid{grid-template-columns:1fr}
  table{font-size:11px}
  th,td{padding:5px 7px}
  .vh-name{font-size:15px}
  .hero-photo{height:130px}
  .km-row{flex-direction:column;align-items:flex-start}
  .km-row input{max-width:100%;width:100%}
  .export-bar{gap:6px}
  .exp-btn{font-size:11px;padding:5px 10px}
}
@media(max-width:640px){
  .sb-mobile-btns-placeholder{display:none}
}
</style>

<body>
<div class="notif" id="notif"></div>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const SB_URL='https://wxuswkgzrshayrposndz.supabase.co';
const SB_KEY='sb_publishable_GkWMSMin0tJH0qocqOSZyw_pGE7mqeh';
function H(t){return{apikey:SB_KEY,Authorization:`Bearer ${t||SB_KEY}`,'Content-Type':'application/json'};}
async function sbSignIn(e,p){const r=await fetch(`${SB_URL}/auth/v1/token?grant_type=password`,{method:'POST',headers:{'apikey':SB_KEY,'Content-Type':'application/json'},body:JSON.stringify({email:e,password:p})});return r.json();}
async function sbSignOut(t){await fetch(`${SB_URL}/auth/v1/logout`,{method:'POST',headers:H(t)});}
async function sbAll(t){const r=await fetch(`${SB_URL}/rest/v1/vehicles?select=*&order=updated_at.asc`,{headers:H(t)});return r.json();}
async function sbUpsert(v,t){await fetch(`${SB_URL}/rest/v1/vehicles`,{method:'POST',headers:{...H(t),Prefer:'resolution=merge-duplicates'},body:JSON.stringify({id:v.id,data:v,updated_at:new Date().toISOString()})});}
async function sbDel(id,t){await fetch(`${SB_URL}/rest/v1/vehicles?id=eq.${id}`,{method:'DELETE',headers:H(t)});}
async function sbUpload(path,b64,mime,t){const blob=await(await fetch(b64)).blob();const r=await fetch(`${SB_URL}/storage/v1/object/garage-files/${path}`,{method:'POST',headers:{apikey:SB_KEY,Authorization:`Bearer ${t}`,'Content-Type':mime||'application/octet-stream'},body:blob});return r.ok?`${SB_URL}/storage/v1/object/public/garage-files/${path}`:null;}
async function sbDelFile(path,t){await fetch(`${SB_URL}/storage/v1/object/garage-files/${path}`,{method:'DELETE',headers:{apikey:SB_KEY,Authorization:`Bearer ${t}`}});}

let session=null,vehicles=[],currentId=null,currentTab='resumen',saveTimer=null;
let SS={arreglos:{c:null,d:'desc'},aceite:{c:null,d:'desc'},ruedas:{c:null,d:'desc'},combustible:{c:null,d:'desc'},mantenimientos:{c:null,d:'desc'},tareas:{c:null,d:'desc'}};
// AUTH
function renderLogin(err=''){document.getElementById('root').innerHTML=`<div class="login-wrap"><div class="login-box"><div class="login-title">🔧 Mi Garaje</div><div class="login-sub">Inicia sesión para continuar</div><div class="login-field"><label>Email</label><input type="email" id="l_email" placeholder="tu@email.com"></div><div class="login-field"><label>Contraseña</label><input type="password" id="l_pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div><div class="login-err" id="l_err">${err}</div><button class="login-btn" onclick="doLogin()">Entrar</button></div></div>`;}
async function doLogin(){const email=document.getElementById('l_email').value,pass=document.getElementById('l_pass').value;if(!email||!pass){document.getElementById('l_err').textContent='Rellena todos los campos';return;}document.getElementById('l_err').textContent='Comprobando...';const d=await sbSignIn(email,pass);if(d.access_token){session=d;localStorage.setItem('gs',JSON.stringify({a:d.access_token,r:d.refresh_token,exp:Date.now()+3500000}));await loadData();}else document.getElementById('l_err').textContent='Email o contraseña incorrectos';}
async function refreshSession(){try{const s=JSON.parse(localStorage.getItem('gs')||'{}');if(!s.r)return false;const d=await(await fetch(`${SB_URL}/auth/v1/token?grant_type=refresh_token`,{method:'POST',headers:{'apikey':SB_KEY,'Content-Type':'application/json'},body:JSON.stringify({refresh_token:s.r})})).json();if(d.access_token){session={access_token:d.access_token};localStorage.setItem('gs',JSON.stringify({a:d.access_token,r:d.refresh_token,exp:Date.now()+3500000}));return true;}return false;}catch(e){return false;}}
// Renovar token automáticamente cada 45 minutos
setInterval(async()=>{if(session)await refreshSession();},45*60*1000);
async function doLogout(){if(session)await sbSignOut(session.access_token);session=null;vehicles=[];currentId=null;localStorage.removeItem('gs');renderLogin();}

// DATA
async function loadData(){renderShell();try{const rows=await sbAll(session.access_token);vehicles=Array.isArray(rows)?rows.map(r=>r.data):[];if(vehicles.length&&!currentId)currentId=vehicles[0].id;}catch(e){notif('Error cargando datos');}render();}
function scheduleSave(vid){clearTimeout(saveTimer);saveTimer=setTimeout(()=>doSave(vid||currentId),700);}
async function doSave(vid){const v=vehicles.find(x=>x.id===vid);if(v)await sbUpsert(v,session.access_token).catch(()=>notif('Error al guardar'));}

// HELPERS
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function gf(id){return document.getElementById('f_'+id)?.value||'';}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function curV(){return vehicles.find(x=>x.id===currentId);}
function notif(m){const n=document.getElementById('notif');n.textContent=m;n.classList.add('show');setTimeout(()=>n.classList.remove('show'),2500);}
function modal(h){document.getElementById('modal-area').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()">${h}</div>`;}
function closeModal(){document.getElementById('modal-area').innerHTML='';}
function fi(id,l,v='',t='text'){return `<div class="ff"><label>${l}</label><input type="${t}" id="f_${id}" value="${esc(v)}"></div>`;}
function fta(id,l,v=''){return `<div class="ff s2"><label>${l}</label><textarea id="f_${id}">${esc(v)}</textarea></div>`;}
function fld(l,v){return `<div class="vhf"><label>${l}</label><span>${esc(v)||'—'}</span></div>`;}
function noRows(n){return `<tr><td colspan="${n}" style="text-align:center;color:#aaa;padding:18px">Sin registros</td></tr>`;}
function eur(v){return v&&v!==''?Number(v).toFixed(2)+' €':'—';}
function fileToBase64(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsDataURL(f);});}
function delRec(arr,rid){const v=curV();if(!v)return;v[arr]=(v[arr]||[]).filter(r=>r.id!==rid);scheduleSave();render();}
function itvCls(d){if(!d)return'';const diff=(new Date(d)-new Date())/86400000;return diff<0?'itv-danger':diff<90?'itv-warn':'itv-ok';}
function itvLabel(d){if(!d)return'—';const c=itvCls(d);const t={'itv-danger':'⚠ Caducada','itv-warn':'⚡ Próxima','itv-ok':'✓ Vigente'};const b={'itv-danger':'b-danger','itv-warn':'b-warn','itv-ok':'b-ok'};return `<span class="${c}">${d} <span class="badge ${b[c]}">${t[c]}</span></span>`;}

// SORT
function sortData(arr,sec){const s=SS[sec];if(!s||!s.c)return[...arr];return[...arr].sort((a,b)=>{let va=a[s.c],vb=b[s.c];const nums=['kms','precio','litros','preciolitro','importe'];if(nums.includes(s.c)){va=parseFloat(va)||0;vb=parseFloat(vb)||0;}else{va=(va||'').toString().toLowerCase();vb=(vb||'').toString().toLowerCase();}if(va<vb)return s.d==='asc'?-1:1;if(va>vb)return s.d==='asc'?1:-1;return 0;});}
function th(sec,col,label){const s=SS[sec];const cls=s.c===col?(s.d==='asc'?'sort-asc':'sort-desc'):'sortable';return `<th class="${cls}" onclick="tsort('${sec}','${col}')">${label}</th>`;}
function tsort(sec,col){const s=SS[sec];if(s.c===col)s.d=s.d==='asc'?'desc':'asc';else{s.c=col;s.d='desc';}render();}

// SHELL
function renderShell(){document.getElementById('root').innerHTML=`
<div class="app">
  <div class="sidebar">
    <div class="sb-head"><div class="sb-title">🔧 Mi Garaje</div><div class="sb-sub" id="vcount">Cargando...</div></div>
    <div class="vlist" id="vlist"></div>
    <div class="sb-mobile-btns">
      <button class="sb-toggle" onclick="toggleVlist()">☰ Vehículos</button>
      <button class="sb-add" onclick="openAddV()">+</button>
      <button class="sb-logout" onclick="doLogout()">⏻</button>
    </div>
    <button class="add-vbtn" onclick="openAddV()">+ Añadir vehículo</button>
    <button class="logout-btn" onclick="doLogout()">Cerrar sesión</button>
  </div>
  <div class="main">
    <div class="tabs" id="tabs" style="display:none">
      <div class="tab active" data-tab="resumen"        onclick="setTab('resumen')">Resumen</div>
      <div class="tab"        data-tab="arreglos"       onclick="setTab('arreglos')">Arreglos</div>

function render(){
  if(!document.getElementById('vcount'))return;
  document.getElementById('vcount').textContent=`${vehicles.length} vehículo${vehicles.length!==1?'s':''}`;
  document.getElementById('vlist').innerHTML=vehicles.map(v=>`<div class="vitem ${v.id===currentId?'active':''}" onclick="selV('${v.id}')"><div class="vname">${esc(v.marca||'—')} ${esc(v.modelo||'')}</div><div class="vplate">${esc(v.matricula||'Sin matrícula')}</div></div>`).join('');
  const tabs=document.getElementById('tabs'),cnt=document.getElementById('content');
  if(!currentId){tabs.style.display='none';cnt.innerHTML='<div class="empty">🔧<br>Selecciona o añade un vehículo</div>';return;}
  tabs.style.display='flex';
  tabs.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===currentTab));
  const v=curV();if(!v)return;
  const map={resumen,arreglos,aceite,ruedas,mantenimientos,referencias,combustible,tareas,fotos,documentos,balance};
  cnt.innerHTML=(map[currentTab]||resumen)(v);
}
function toggleVlist(){document.getElementById('vlist').classList.toggle('open');}
function selV(id){currentId=id;currentTab='resumen';document.getElementById('vlist').classList.remove('open');render();}

// RESUMEN
function resumen(v){
  const portadaIdx=v.portadaIdx||0;
  const hero=(v.fotos||[])[portadaIdx]?`<img class="hero-photo" src="${v.fotos[portadaIdx].url||v.fotos[portadaIdx].data}" alt="foto">`:'';
  const pendTareas=(v.tareas||[]).filter(t=>!t.done).length;
  let pending='';
  if(v._kmCheck&&(v.mantenimientos||[]).length){
    const km=parseFloat(v._kmCheck);
    pending='<div class="plist">'+v.mantenimientos.map(m=>{
      const last=(v.histMantenimientos||[]).filter(h=>h.tipo===m.tipo).sort((a,b)=>b.kms-a.kms)[0];
      const next=(last?parseFloat(last.kms):0)+parseFloat(m.intervalKm),rem=next-km;
      const cls=rem<=0?'pi-urg':rem<parseFloat(m.intervalKm)*0.1?'pi-soon':'pi-ok';
      const lbl=rem<=0?`VENCIDO por ${Math.abs(Math.round(rem)).toLocaleString()} km`:`En ${Math.round(rem).toLocaleString()} km (próximo: ${Math.round(next).toLocaleString()} km)`;
      return `<div class="pi ${cls}"><strong>${esc(m.tipo)}</strong> — ${lbl}</div>`;
    }).join('')+'</div>';
  }
  return `${hero}
  <div class="vh-card">
    <div class="vh-top">
      <div class="vh-name">${esc(v.marca||'—')} ${esc(v.modelo||'')} <span style="font-size:13px;font-weight:400;color:#888">${esc(v.variante||'')}</span></div>
      <div style="display:flex;gap:6px">
        ${pendTareas?`<span class="badge b-warn" style="cursor:pointer" onclick="setTab('tareas')">📋 ${pendTareas} tarea${pendTareas!==1?'s':''} pendiente${pendTareas!==1?'s':''}</span>`:''}
        <button class="edt-btn" onclick="openEditV('${v.id}')">Editar ficha</button>
        <button class="del-btn" onclick="delV('${v.id}')">Eliminar</button>
      </div>
    </div>
    <div class="vh-grid">
      ${fld('Matrícula',v.matricula)}${fld('Bastidor (VIN)',v.bastidor)}${fld('Cód. motor',v.codMotor)}
      ${fld('Variante',v.variante)}${fld('Cód. pintura',v.codPintura)}
      ${fld('Fecha compra',v.fechaCompra)}${fld('Km en compra',v.kmCompra?Number(v.kmCompra).toLocaleString()+' km':'')}
      ${fld('Precio compra',v.precio?v.precio+' €':'')}
      <div class="vhf"><label>Próxima ITV</label><span>${itvLabel(v.itv)}</span></div>
    </div>
  </div>
  <div class="km-box">
    <div style="font-size:13px;font-weight:600">Comprobador de mantenimientos</div>
    <div class="km-row"><input type="number" placeholder="Km actuales del vehículo" value="${esc(v._kmCheck||'')}" oninput="updKm('${v.id}',this.value)"><span style="font-size:12px;color:#888">Introduce los km para ver pendientes</span></div>
    ${pending}
  </div>
  <div class="notes-box">
    <div style="font-size:13px;font-weight:600;margin-bottom:8px">Observaciones generales</div>
    <textarea style="width:100%;min-height:70px;font-size:13px;border:1px solid #ddd;border-radius:7px;padding:8px;resize:vertical" placeholder="Anotaciones, recordatorios, detalles del vehículo..." oninput="updNotes('${v.id}',this.value)">${esc(v.notas||'')}</textarea>
  </div>
  <div class="export-bar">
    <button class="exp-btn" onclick="exportExcel('${v.id}')">⬇ Exportar Excel</button>
    <button class="exp-btn" onclick="exportPDF('${v.id}')">⬇ Exportar PDF</button>
  </div>`;
}

// COMBUSTIBLE
function combustible(v){
  const comb=v.combustible||[];
  const rows=sortData(comb,'combustible').map(r=>`<tr><td>${esc(r.tipo)}</td><td>${r.litros?Number(r.litros).toFixed(2):'—'}</td><td>${r.preciolitro?Number(r.preciolitro).toFixed(3)+' €':'—'}</td><td>${eur(r.importe)}</td><td>${r.kms?Number(r.kms).toLocaleString():'—'}</td><td>${esc(r.fecha)}</td><td>${esc(r.gasolinera)}</td><td><div class="acell"><button class="edt-btn" onclick="editCombustible('${v.id}','${r.id}')">Edit</button><button class="del-btn" onclick="delRec('combustible','${r.id}')">×</button></div></td></tr>`).join('');
  const totalL=comb.reduce((s,r)=>s+parseFloat(r.litros||0),0);
  const totalE=comb.reduce((s,r)=>s+parseFloat(r.importe||0),0);
  // Resumen mensual
  const meses={};
  comb.forEach(r=>{
    if(!r.fecha)return;
    const key=r.fecha.slice(0,7); // YYYY-MM
    if(!meses[key])meses[key]={l:0,e:0,n:0};
    meses[key].l+=parseFloat(r.litros||0);
    meses[key].e+=parseFloat(r.importe||0);
    meses[key].n++;
  });
  const mesesOrdenados=Object.keys(meses).sort((a,b)=>b.localeCompare(a));
  const MESES_ES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const mensualRows=mesesOrdenados.map(k=>{
    const [y,m]=k.split('-');
    const label=`${MESES_ES[parseInt(m)-1]} ${y}`;
    return `<tr><td><strong>${label}</strong></td><td>${meses[k].l.toFixed(1)} L</td><td>${meses[k].e.toFixed(2)} €</td><td>${meses[k].n} repostaje${meses[k].n!==1?'s':''}</td></tr>`;
  }).join('');

  return `<div class="sec-hdr"><div class="sec-title">Repostajes</div><button class="add-btn" onclick="addCombustible('${v.id}')">+ Añadir</button></div>

function balance(v){
  const allYears=[...(v.arreglos||[]),(v.aceite||[]),(v.ruedas||[]),(v.histMantenimientos||[]),(v.combustible||[])].flat().map(r=>r.fecha?.slice(0,4)).filter(Boolean);
  const years=[...new Set(allYears)].sort((a,b)=>b-a);
  const sel=v._balYear||(years[0]||String(new Date().getFullYear()));
  const inY=(arr)=>arr.filter(r=>(r.fecha||'').startsWith(sel));
  const sum=(arr,c='precio')=>arr.reduce((s,r)=>s+parseFloat(r[c]||0),0);
  const tA=sum(inY(v.arreglos||[])),tAc=sum(inY(v.aceite||[])),tR=sum(inY(v.ruedas||[])),tM=sum(inY(v.histMantenimientos||[])),tC=sum(inY(v.combustible||[]),'importe');

  const yOpts=years.map(y=>`<option ${y===sel?'selected':''}>${y}</option>`).join('');
  const det=(titulo,arr,c='precio')=>{const items=inY(arr).filter(r=>parseFloat(r[c]||0)>0);if(!items.length)return'';return `<div style="margin-bottom:14px"><div style="font-size:12px;font-weight:600;color:#666;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #eee">${titulo}</div><div class="tbl-wrap"><table><thead><tr><th>Descripción</th><th>Fecha</th><th>Importe</th></tr></thead><tbody>${items.map(r=>`<tr><td>${esc(r.cambio||r.tipo||r.posicion||r.marca||'—')}</td><td>${esc(r.fecha)}</td><td><strong>${eur(r[c])}</strong></td></tr>`).join('')}<tr style="background:#f8f8f6"><td colspan="2" style="font-weight:600">Total ${titulo}</td><td><strong>${sum(items,c).toFixed(2)} €</strong></td></tr></tbody></table></div></div>`;};
  return `<div class="year-sel"><div style="font-size:14px;font-weight:600">Balance de gastos</div><select onchange="setBalYear('${v.id}',this.value)">${yOpts}${!years.length?`<option>${new Date().getFullYear()}</option>`:''}</select></div>
  <div class="balance-grid">
    <div class="bal-card"><div class="bal-label">🔧 Arreglos</div><div class="bal-amount">${tA.toFixed(2)} €</div><div class="bal-count">${inY(v.arreglos||[]).length} registros</div></div>
    <div class="bal-card"><div class="bal-label">🛢 Aceite</div><div class="bal-amount">${tAc.toFixed(2)} €</div><div class="bal-count">${inY(v.aceite||[]).length} cambios</div></div>
    <div class="bal-card"><div class="bal-label">🔄 Ruedas</div><div class="bal-amount">${tR.toFixed(2)} €</div><div class="bal-count">${inY(v.ruedas||[]).length} registros</div></div>
    <div class="bal-card"><div class="bal-label">⚙️ Mantenimiento</div><div class="bal-amount">${tM.toFixed(2)} €</div><div class="bal-count">${inY(v.histMantenimientos||[]).length} registros</div></div>
    <div class="bal-card"><div class="bal-label">⛽ Combustible</div><div class="bal-amount">${tC.toFixed(2)} €</div><div class="bal-count">${inY(v.combustible||[]).length} repostajes</div></div>
    <div class="bal-card bal-total"><div class="bal-label">TOTAL ${sel}</div><div class="bal-amount">${total.toFixed(2)} €</div><div class="bal-count">todos los gastos</div></div>
  </div>
  ${det('Arreglos',v.arreglos||[])}${det('Aceite',v.aceite||[])}${det('Ruedas',v.ruedas||[])}${det('Mantenimientos',v.histMantenimientos||[])}${det('Combustible',v.combustible||[],'importe')}`;
}

function exportExcel(vid){const v=vehicles.find(x=>x.id===vid);if(!v)return;const wb=XLSX.utils.book_new();const sh=(n,d)=>XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(d),n);sh('Ficha',[['Campo','Valor'],['Marca',v.marca],['Modelo',v.modelo],['Matrícula',v.matricula],['Bastidor',v.bastidor],['Cód. motor',v.codMotor],['Cód. pintura',v.codPintura],['Variante',v.variante],['Fecha compra',v.fechaCompra],['Km compra',v.kmCompra],['Precio',v.precio],['Próxima ITV',v.itv]]);if((v.arreglos||[]).length)sh('Arreglos',[['Cambio/Pieza','Marca','Nuevo/Ocasión','Km','Fecha','Taller/Casa','Precio','Observaciones'],...v.arreglos.map(r=>[r.cambio,r.marca,r.condicion,r.kms,r.fecha,r.taller,r.precio,r.observaciones])]);if((v.aceite||[]).length)sh('Aceite',[['Marca','Tipo','Filtro','Km','Fecha','Precio'],...v.aceite.map(r=>[r.marca,r.tipo,r.filtro,r.kms,r.fecha,r.precio])]);if((v.ruedas||[]).length)sh('Ruedas',[['Posición','Marca','Medida','Km','Fecha','Precio','Observaciones'],...v.ruedas.map(r=>[r.posicion,r.marca,r.medida,r.kms,r.fecha,r.precio,r.observaciones])]);if((v.histMantenimientos||[]).length)sh('Mantenimientos',[['Tipo','Km','Fecha','Precio','Notas'],...v.histMantenimientos.map(r=>[r.tipo,r.kms,r.fecha,r.precio,r.notas])]);if((v.combustible||[]).length)sh('Combustible',[['Tipo','Litros','€/L','Importe','Km','Fecha','Gasolinera'],...v.combustible.map(r=>[r.tipo,r.litros,r.preciolitro,r.importe,r.kms,r.fecha,r.gasolinera])]);if((v.tareas||[]).length)sh('Tareas',[['Tipo','Fecha','Descripción','Estado'],...v.tareas.map(r=>[r.tipo,r.fecha,r.observaciones,r.done?'Completada':'Pendiente'])]);if((v.referencias||[]).length)sh('Referencias',[['Categoría','Nombre','Referencia','Marca','Notas'],...v.referencias.map(r=>[r.categoria,r.nombre,r.referencia,r.marca,r.notas])]);XLSX.writeFile(wb,`${v.marca||'vehiculo'}_${v.matricula||'historial'}.xlsx`);}

function exportPDF(vid){const v=vehicles.find(x=>x.id===vid);if(!v)return;const tbl=(h,r)=>!r.length?'<p style="color:#888">Sin registros</p>':`<table><thead><tr>${h.map(x=>`<th>${x}</th>`).join('')}</tr></thead><tbody>${r.map(r=>`<tr>${r.map(c=>`<td>${c||'—'}</td>`).join('')}</tr>`).join('')}</tbody></table>`;const win=window.open('','_blank');win.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${v.marca} ${v.modelo}</title><style>body{font-family:Arial,sans-serif;font-size:12px;padding:24px}h1{font-size:20px;margin-bottom:4px}h2{font-size:14px;margin:20px 0 8px;border-bottom:1px solid #ddd;padding-bottom:4px}table{width:100%;border-collapse:collapse;margin-bottom:12px}th{background:#f5f5f5;padding:6px 8px;text-align:left;font-size:11px;border:1px solid #ddd}td{padding:5px 8px;border:1px solid #ddd;font-size:11px}.meta span{display:inline-block;margin:3px 12px 3px 0}</style></head><body><h1>${v.marca||''} ${v.modelo||''} ${v.variante||''}</h1><div class="meta"><span>Matrícula: <strong>${v.matricula||'—'}</strong></span><span>Bastidor: <strong>${v.bastidor||'—'}</strong></span><span>Motor: <strong>${v.codMotor||'—'}</strong></span><span>Pintura: <strong>${v.codPintura||'—'}</strong></span><span>Km compra: <strong>${v.kmCompra||'—'}</strong></span><span>ITV: <strong>${v.itv||'—'}</strong></span></div><h2>Arreglos</h2>${tbl(['Cambio/Pieza','Marca','Cond.','Km','Fecha','Taller','Precio','Obs.'],(v.arreglos||[]).map(r=>[r.cambio,r.marca,r.condicion,r.kms,r.fecha,r.taller,r.precio?(+r.precio).toFixed(2)+' €':'',r.observaciones]))}<h2>Aceite</h2>${tbl(['Marca','Tipo','Filtro','Km','Fecha','Precio'],(v.aceite||[]).map(r=>[r.marca,r.tipo,r.filtro,r.kms,r.fecha,r.precio?(+r.precio).toFixed(2)+' €':'']))}<h2>Ruedas</h2>${tbl(['Posición','Marca','Medida','Km','Fecha','Precio'],(v.ruedas||[]).map(r=>[r.posicion,r.marca,r.medida,r.kms,r.fecha,r.precio?(+r.precio).toFixed(2)+' €':'']))}<h2>Mantenimientos</h2>${tbl(['Tipo','Km','Fecha','Precio','Notas'],(v.histMantenimientos||[]).map(r=>[r.tipo,r.kms,r.fecha,r.precio?(+r.precio).toFixed(2)+' €':'',r.notas]))}<h2>Combustible</h2>${tbl(['Tipo','Litros','€/L','Importe','Km','Fecha','Gasolinera'],(v.combustible||[]).map(r=>[r.tipo,r.litros,r.preciolitro,r.importe?(+r.importe).toFixed(2)+' €':'',r.kms,r.fecha,r.gasolinera]))}<h2>Tareas pendientes</h2>${tbl(['Tipo','Fecha','Descripción','Estado'],(v.tareas||[]).map(r=>[r.tipo,r.fecha,r.observaciones,r.done?'Completada':'Pendiente']))}<script>window.onload=()=>window.print()<\/script></body></html>`);win.document.close();}

// INIT
(async()=>{
  const saved=localStorage.getItem('gs');
  if(saved){
    try{
      const s=JSON.parse(saved);
      // Si el token no ha caducado, úsalo directamente
      if(s.exp&&Date.now()<s.exp){
        session={access_token:s.a};
        const r=await fetch(`${SB_URL}/auth/v1/user`,{headers:{apikey:SB_KEY,Authorization:`Bearer ${s.a}`}});
        if(r.ok){await loadData();return;}
      }
      // Si caducó, intentar renovar con refresh token
      if(s.r){
        session={access_token:s.a};
        const ok=await refreshSession();
        if(ok){await loadData();return;}
      }
    }catch(e){}
  }
  renderLogin();
})();
</script>
</body>
</html>
